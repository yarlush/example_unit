name: Windows C++ CI

on: [push, pull_request]

jobs:
  build-and-test:
    # Use a Windows runner as the tests depend on the Visual Studio environment
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '[17.0,)' # This finds the latest version that is 17.0 or newer.

    - name: Setup Visual Studio environment
      # This action sets up the necessary environment variables for MSVC build tools
      uses: ilammy/msvc-dev-cmd@v1.4.1
      # You can specify the architecture, e.g., 'x64' or 'x86'
      with:
        arch: x64

    - name: Build Solution
      # Use MSBuild to compile the entire solution, including the test projects
      run: msbuild example_unit.sln /p:Configuration=Debug /p:Platform=x64

    - name: Find VSTest.console.exe path (recommended)
      id: find_vstest
      run: |
        $vstest_path = Get-ChildItem -Path "C:\Program Files (x86)\Microsoft Visual Studio" -Filter "vstest.console.exe" -Recurse | Select -ExpandProperty FullName | Select-Object -First 1
        echo "Found VSTest at: $vstest_path"
        echo "VSTEST_PATH=$vstest_path" | Out-File -FilePath $env:GITHUB_ENV -Encoding Utf8 -Append
      shell: powershell

    - name: Run C++ tests with VSTest
      # Use the path found in the previous step
      run: |
        ${{ env.VSTEST_PATH }} TEST.dll /Platform:x64 /Logger:trx
      # The VSTest action marketplace has some issues/deprecations, so manual execution is safer
      shell: cmd
      
    - name: Upload test results artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: 'tests/latest.trx' # Upload the .trx results file
